<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CYROS AHP Decision Support Tool</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="brandHeader">
      <div class="logoBar">
        <img src="assets/interreg-cyros.png" class="logo interreg" alt="Interreg Italy-Croatia CYROS" />
        <img src="assets/itl-logo.png" class="logo itl" alt="Fondazione ITL" />
      </div>
      <section class="hero">
        <span class="version">Version 1.0</span>
        <h1>CYROS AHP Decision Support Tool</h1>
        <p class="lead">Decision support system for prioritising cross-border cycling policies</p>
        <p class="minor">Italy-Croatia Adriatic-Ionian Cycling Corridor</p>
        <div class="heroActions">
          <button class="btn primary" data-route="criteria">Start Assessment</button>
          <button class="btn ghost" data-route="results">View Results</button>
        </div>
      </section>
    </header>

    <nav class="topNav" aria-label="Workflow navigation">
      <button class="navItem active" data-route="overview">Overview</button>
      <button class="navItem" data-route="criteria">Criteria</button>
      <button class="navItem" data-route="policies">Policies</button>
      <button class="navItem" data-route="results">Results</button>
      <button class="navItem subtle" id="btnReset" type="button">Reset</button>
      <button class="navItem subtle" id="btnExport" type="button">Export JSON</button>
    </nav>

    <main id="app" class="app"></main>

    <footer class="footer">
      <a href="https://www.italy-croatia.eu/web/cyros" target="_blank" rel="noopener">https://www.italy-croatia.eu/web/cyros</a>
      <span>Copyright © Fondazione ITL</span>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
